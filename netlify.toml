# 1. Build settings (Tells Netlify how to build your Vite project)
[build]
  command = "npm run build"
  publish = "dist"

# 2. SPA redirects (Prevents 404 errors on page refresh in React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 3. Security Headers (DPDP Compliant strict security rules)
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://api.infermedica.com https://dev.abdm.gov.in https://maps.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com; connect-src 'self' https://api.infermedica.com https://dev.abdm.gov.in https://maps.googleapis.com;"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"
